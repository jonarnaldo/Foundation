version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: foundation_postgres
    environment:
      POSTGRES_USER: foundation
      POSTGRES_PASSWORD: foundation
      POSTGRES_DB: foundation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foundation_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
